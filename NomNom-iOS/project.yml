name: NomNom
options:
  bundleIdPrefix: com.nomnom
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "14.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.8"
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_KEY_UILaunchScreen_Generation: YES

targets:
  NomNom:
    type: application
    platform: iOS
    sources:
      - NomNom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nomnom-ai.app
        PRODUCT_NAME: NomNom
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: NomNom
        ALWAYS_SEARCH_USER_PATHS: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "NomNom needs camera access to photograph your food"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "NomNom needs photo library access to select food photos"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - NomNomTests

  NomNomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NomNomTests
    dependencies:
      - target: NomNom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nomnom-ai.app.tests
        GENERATE_INFOPLIST_FILE: YES
